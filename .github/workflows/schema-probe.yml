name: Schema Probe

# Pre-flight check against a live Unraid GraphQL endpoint. Catches schema
# drift early (#62) without waiting for a user to hit a broken tool.
#
# Required repository secrets (configure under Settings → Secrets and variables
# → Actions before the first run):
#   UNRAID_HOST     — hostname or IP of the test Unraid server
#   UNRAID_API_KEY  — API key from the Unraid WebGUI
#
# Optional:
#   UNRAID_PORT, UNRAID_USE_HTTPS, UNRAID_VERIFY_SSL
#
# The workflow exits cleanly when secrets are missing so a fresh clone can
# install the workflow without a failing required check.
#
# On drift detection (probe exits non-zero), the workflow auto-creates or
# updates a GitHub issue with the drift report (#152). Suppress that step
# by dispatching the workflow manually with suppress_issue=true.

on:
  workflow_dispatch:
    inputs:
      suppress_issue:
        description: "Skip auto-issue creation on drift (for forks)"
        type: boolean
        default: false
  schedule:
    - cron: "0 7 * * *"

concurrency:
  group: schema-probe
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  probe:
    name: GraphQL Schema Probe
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check for required secrets
        id: secrets
        env:
          UNRAID_HOST: ${{ secrets.UNRAID_HOST }}
          UNRAID_API_KEY: ${{ secrets.UNRAID_API_KEY }}
        run: |
          if [ -z "$UNRAID_HOST" ] || [ -z "$UNRAID_API_KEY" ]; then
            echo "::notice::UNRAID_HOST / UNRAID_API_KEY secrets not configured — skipping live probe"
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.secrets.outputs.configured == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        if: steps.secrets.outputs.configured == 'true'
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Set up Python
        if: steps.secrets.outputs.configured == 'true'
        run: uv python install 3.13

      - name: Install dependencies
        if: steps.secrets.outputs.configured == 'true'
        run: uv sync

      - name: Run schema-compatibility probe
        id: probe
        if: steps.secrets.outputs.configured == 'true'
        env:
          UNRAID_HOST: ${{ secrets.UNRAID_HOST }}
          UNRAID_API_KEY: ${{ secrets.UNRAID_API_KEY }}
          UNRAID_PORT: ${{ secrets.UNRAID_PORT }}
          UNRAID_USE_HTTPS: ${{ secrets.UNRAID_USE_HTTPS }}
          UNRAID_VERIFY_SSL: ${{ secrets.UNRAID_VERIFY_SSL }}
        # Redirect stdout only to probe.log (drift field-name lines — safe to
        # publish publicly).  Stderr (diagnostic messages, raw HTTP error bodies)
        # flows to the CI log unchanged for debugging but is never captured into
        # probe.log and therefore never posted to the public issue or step summary.
        run: |
          uv run unraid-mcp --check-schema > probe.log
        continue-on-error: true

      - name: Scrub probe.log against drift allowlist
        id: scrub
        if: steps.secrets.outputs.configured == 'true' && steps.probe.outcome == 'failure'
        run: |
          set -euo pipefail
          # Fail-closed allowlist scrub of probe.log before any public post.
          # probe.log captures only stdout from `unraid-mcp --check-schema`,
          # which emits exclusively schema-drift lines in one of two fixed
          # formats (see _emit_drift / compute_schema_drift in src/unraid_mcp).
          # Diagnostic text and raw HTTP error bodies stay on stderr (CI log
          # only). This guard ensures a future stray stdout write — a rogue
          # print(), or a dependency writing to stdout — can never silently
          # publish to the public issue/summary.
          #
          # Drift line grammar (Python list repr of sorted field-name strings):
          #   <Type>: missing fields ['a', 'b']
          #   <Type>: type missing from server schema (client expects fields ['a'])
          # Type and field names are GraphQL identifiers: [A-Za-z0-9_]+.
          field_list="\\['[A-Za-z0-9_]+'(, '[A-Za-z0-9_]+')*\\]|\\[\\]"
          allow_missing="^[A-Za-z0-9_]+: missing fields ($field_list)$"
          allow_type="^[A-Za-z0-9_]+: type missing from server schema \\(client expects fields ($field_list)\\)$"

          if [ ! -f probe.log ]; then
            echo "::error::probe.log not found — refusing to post."
            {
              echo "has_drift=false"
              echo "safe=false"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Only non-blank lines are meaningful drift content.
          content=$(grep -v '^[[:space:]]*$' probe.log || true)

          if [ -z "$content" ]; then
            echo "::notice::probe reported failure but produced no drift lines — nothing to post."
            {
              echo "has_drift=false"
              echo "safe=true"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Fail closed: every non-blank line MUST match an allowed drift format.
          unexpected=$(printf '%s\n' "$content" | grep -vE "$allow_missing|$allow_type" || true)
          if [ -n "$unexpected" ]; then
            echo "::error::probe.log contains lines outside the schema-drift allowlist — refusing to post to the public issue/summary. Inspect the CI log; the unexpected content is NOT echoed here to avoid disclosure."
            echo "Unexpected line count: $(printf '%s\n' "$unexpected" | grep -c .)"
            {
              echo "has_drift=true"
              echo "safe=false"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "has_drift=true"
            echo "safe=true"
          } >> "$GITHUB_OUTPUT"

      - name: Publish drift report to step summary
        if: >-
          steps.secrets.outputs.configured == 'true'
          && steps.probe.outcome == 'failure'
          && steps.scrub.outputs.safe == 'true'
          && steps.scrub.outputs.has_drift == 'true'
        run: |
          {
            echo "## Schema drift detected"
            echo ""
            echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ""
            echo '```'
            cat probe.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Ensure schema-drift label exists
        if: >-
          steps.secrets.outputs.configured == 'true'
          && steps.probe.outcome == 'failure'
          && steps.scrub.outputs.safe == 'true'
          && steps.scrub.outputs.has_drift == 'true'
          && inputs.suppress_issue != true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # --force makes the label idempotent: creates if missing, updates
          # description/colour if already present. Tolerate failure so the
          # workflow's final exit status reflects the probe, not gh quirks.
          gh label create schema-drift \
            --color d73a4a \
            --description "Detected by nightly schema probe (#152)" \
            --force || true

      - name: File or update drift issue
        if: >-
          steps.secrets.outputs.configured == 'true'
          && steps.probe.outcome == 'failure'
          && steps.scrub.outputs.safe == 'true'
          && steps.scrub.outputs.has_drift == 'true'
          && inputs.suppress_issue != true
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          # De-duplicate: reuse the oldest open `schema-drift` issue if one
          # exists, otherwise file a new one. `gh issue list` defaults to
          # sort:created-desc (newest first), so an explicit
          # `--search "sort:created-asc"` is required to pick the oldest —
          # the issue with accumulated history. probe.log contains only
          # drift field-name lines (stdout); raw HTTP error bodies stay in
          # the CI log (stderr) and are never posted here.
          LOG=$(head -c 50000 probe.log)
          # shellcheck disable=SC2016  # printf format is intentionally literal; values flow through %s args.
          BODY=$(printf '## Schema drift detected\n\nRun: %s\n\n```\n%s\n```\n' "$RUN_URL" "$LOG")

          existing=$(gh issue list --label schema-drift --state open --search "sort:created-asc" --limit 1 --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$BODY" || true
            echo "::notice::Appended drift report to issue #$existing"
          else
            gh issue create \
              --title "Schema drift detected (probe run ${{ github.run_id }})" \
              --label "bug,schema-drift" \
              --body "$BODY" \
            || true
          fi

      - name: Fail the job on probe drift
        # Preserve the original red-check semantics so branch protection /
        # required-status-check workflows still see drift as a failure. This
        # also keeps the job red when the scrub refuses to post (safe=false):
        # a withheld report must never present as a green check.
        if: steps.secrets.outputs.configured == 'true' && steps.probe.outcome == 'failure'
        run: exit 1
