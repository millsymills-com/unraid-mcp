repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: debug-statements
      - id: detect-private-key
      - id: no-commit-to-branch
        args: ["--branch", "main"]

  # Use local hooks so pre-commit and CI share a single toolchain via uv,
  # avoiding version drift between pinned hook revs and pyproject extras.
  - repo: local
    hooks:
      - id: ruff
        name: ruff (uv)
        entry: uv run ruff check --fix
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: ruff-format
        name: ruff format (uv)
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: ty
        name: ty (uv)
        entry: uv run ty check src/unraid_mcp/
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true
