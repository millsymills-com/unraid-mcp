name: Mutation Testing

# Opt-in only: mutation runs are slow, so this never fires on push/PR
# automatically. Trigger it by hand from the Actions tab (optionally passing a
# PR number to post the score as a comment). Scope and targets live in
# ``[tool.mutmut]`` in pyproject.toml.
on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to comment the mutation score on (optional)"
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  mutmut:
    name: Mutmut
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run mutation tests
        # Serial (--max-children 1) is the conservative default — deterministic
        # ordering, one clear log to read on failure. mutmut exits 0 on a
        # completed run regardless of survivors (the score is reported by the
        # summarise step, not gated here); a non-zero exit means mutmut itself
        # failed — clean tests broke, no tests cover the mutants, or it crashed
        # — so let it fail the step rather than masking it with ``|| true``.
        run: uv run mutmut run --max-children 1

      - name: Export CI/CD stats
        run: uv run mutmut export-cicd-stats

      - name: Summarise score
        id: score
        run: |
          set -euo pipefail
          python3 - <<'PY' | tee -a "$GITHUB_STEP_SUMMARY"
          import json
          import pathlib
          import sys

          stats_path = pathlib.Path("mutants/mutmut-cicd-stats.json")
          if not stats_path.exists():
              sys.exit("mutmut produced no stats file — `mutmut run` resolved no mutants or crashed.")
          stats = json.loads(stats_path.read_text())
          killed = stats["killed"]
          survived = stats["survived"]
          total = stats["total"]
          resolved = killed + survived
          if resolved == 0:
              sys.exit(
                  f"No resolved mutants (total={total}, timeout={stats['timeout']}, "
                  f"no_tests={stats['no_tests']}) — mutation run was degenerate."
              )
          pct = killed / resolved * 100

          report = "\n".join(
              [
                  "## Mutation testing (mutmut)",
                  "",
                  f"**Killed {killed}/{resolved} resolved mutants — {pct:.1f}%** "
                  f"(global score over resolved mutants — observability only, not gated)",
                  "",
                  "| status | count |",
                  "| --- | --- |",
                  f"| 🎉 killed | {killed} |",
                  f"| 🙁 survived | {survived} |",
                  f"| 🫥 no tests | {stats['no_tests']} |",
                  f"| ⏰ timeout | {stats['timeout']} |",
                  f"| 🤔 suspicious | {stats['suspicious']} |",
                  f"| total generated | {total} |",
                  "",
                  "Inspect survivors locally: `uv run mutmut results` / "
                  "`uv run mutmut show <id>`.",
              ]
          )
          pathlib.Path("mutation-report.md").write_text(report)
          print(report)
          PY

      - name: Comment score on PR
        if: inputs.pr_number != ''
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: gh pr comment "$PR_NUMBER" --body-file mutation-report.md
