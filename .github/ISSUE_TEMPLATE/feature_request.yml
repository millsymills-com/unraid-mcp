name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: A clear description of the feature you'd like.
      placeholder: What would you like to see?
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Describe the problem this feature would solve.
      placeholder: As a user, I want to...
    validations:
      required: true

  - type: dropdown
    id: domain
    attributes:
      label: Unraid Domain
      description: Which area does this relate to?
      options:
        - System / Info
        - Array / Parity
        - Disks / SMART
        - Docker
        - VMs
        - Shares
        - Users
        - Notifications
        - Multiple / General
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: Tool Type
      description: Is this a read or write operation?
      options:
        - Read (query/list/get)
        - Write (create/update/delete/command)
        - Not applicable

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, mockups, or references.
