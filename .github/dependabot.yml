version: 2
updates:
  # Python dependencies — uv ecosystem so uv.lock gets updated.
  #
  # Groups bundle related updates into fewer PRs. The `version-updates` groups
  # collapse routine version bumps; the `applies-to: security-updates` groups
  # bundle co-dependent advisories so they can clear the `Dependency Audit`
  # check in one merge. Groups have no `update-types` filter, so majors stay
  # grouped too.
  #
  # Note: grouping reduces PR count but is not an exclusivity guarantee. A
  # grouped version PR that happens to contain a package with an open advisory
  # can still trigger a separate security PR for that package — Dependabot
  # raises security PRs independently of version grouping by design.
  # The `security-updates` groups only take effect when Dependabot security
  # updates are enabled for the repo (Settings → Code security).
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"
    open-pull-requests-limit: 10
    groups:
      dev-version-updates:
        applies-to: version-updates
        patterns:
          - "pytest*"
          - "ruff"
          - "ty"
          - "bandit*"
          - "respx"
          - "pre-commit"
          - "hypothesis"
      production-version-updates:
        applies-to: version-updates
        patterns:
          - "*"
        exclude-patterns:
          - "pytest*"
          - "ruff"
          - "ty"
          - "bandit*"
          - "respx"
          - "pre-commit"
          - "hypothesis"
      dev-security-updates:
        applies-to: security-updates
        patterns:
          - "pytest*"
          - "ruff"
          - "ty"
          - "bandit*"
          - "respx"
          - "pre-commit"
          - "hypothesis"
      production-security-updates:
        applies-to: security-updates
        patterns:
          - "*"
        exclude-patterns:
          - "pytest*"
          - "ruff"
          - "ty"
          - "bandit*"
          - "respx"
          - "pre-commit"
          - "hypothesis"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 7
    labels:
      - "ci"
      - "dependencies"
    commit-message:
      prefix: "ci"
    open-pull-requests-limit: 5
    groups:
      github-actions-version-updates:
        applies-to: version-updates
        patterns:
          - "*"
      github-actions-security-updates:
        applies-to: security-updates
        patterns:
          - "*"

  # Docker base images (Dockerfile)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 7
    labels:
      - "ci"
      - "dependencies"
    commit-message:
      prefix: "deps"
    open-pull-requests-limit: 5
    groups:
      docker-version-updates:
        applies-to: version-updates
        patterns:
          - "*"
      docker-security-updates:
        applies-to: security-updates
        patterns:
          - "*"
