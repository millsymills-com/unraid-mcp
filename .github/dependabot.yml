version: 2
updates:
  # Python dependencies — uv ecosystem so uv.lock gets updated.
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        patterns:
          - "pytest*"
          - "ruff"
          - "mypy"
          - "bandit*"
          - "respx"
          - "pre-commit"
          - "hypothesis"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 7
    labels:
      - "ci"
      - "dependencies"
    commit-message:
      prefix: "ci"
    open-pull-requests-limit: 5

  # Docker base images (Dockerfile)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 7
    labels:
      - "ci"
      - "dependencies"
    commit-message:
      prefix: "deps"
    open-pull-requests-limit: 5
